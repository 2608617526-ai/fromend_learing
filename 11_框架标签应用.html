<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>框架标签应用</title>
</head>
<body>
    <form action="https://taobao.com/search" target="container">
    <input type="text" name="搜索关键词">
    <button>点我跳转淘宝搜索</button>
    </form>
    <!--form 中的target作用是决定跳转的页面在哪里显示--></form>
    <iframe name="container" frameborder="0" width="300" height="300"></iframe>
</body>
</html>
