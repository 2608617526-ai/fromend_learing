<!DOCTYPE html>  <!-- 这个是声明网站用的哪一代的html技术-->
<html lang="zh-CN">	<!--声明网站用的什么语言-->
<!-- 使用live server 更符合把网页资源上传到服务器，用户通过服务器访问的情况，更利于及时发现问题
 标准结构不能偷懒，否则浏览器会帮你乱补足会错位 -->
<head>
	<meta charset="UTF-8"><!-- 声明网站用的什么码-->
	<title>
		HTML注释
		ကျေးဇူးတင်ပါတယ်
	</title>
</head>

<body>
	<h1>
		kk实在是太帅啦
	</h1>
	<div>
		<p>
			这是一个段落。This is a paragrah.
			<strong>着重强调，十分重要</strong>
			<abbr title="英雄联盟">LOL</abbr>
			这个标签可以实现鼠标悬停
			<del>删除，不要999，只要 99</del>
			<span>没有语义，用来包裹短语，改变颜色什么的</span>>
		</p>
	</div>
	
	<marquee loop="1" backgroundcloor="green">
		kk是大帅哥
		မင်းကို ချစ်တယ်
		\n
		<!-- marquee这个标签现在基本不使用了-->
		<input type="password">
	</marquee>
	<!-- 相对路径 -->
	<img width="100" src="kk的头像.jpg" alt="你相信光吗？">
	<!-- alt是说明图片属性的，能够让图片更好地被搜索到-->
	<img width="100" src="./图片/星际拓荒.jpg" alt="星际拓荒，内心宁静">
	<!-- 
		./代表当前位置，文件夹名称/ 代表下一级位置
		../代表上一级位置，这是相对位置的写法
		同级别插入只需要名字就行了
		图片的单位是像素，只调整宽度，同时高度会等比例缩小，一般不会放大，因为会失真
	-->
	<!-- 本地绝对路径 -->
	 <img width="100" src="C:/Users/kk/Desktop/fromend_learing/图片/星际拓荒.jpg">
	 <!-- livesever不支持本地路径 -->
	 <!-- 可以跳转其他网页上的图片，网络绝对路径，有防盗链的网络图片用不了 -->
	<img width="100" src="https://cmsfiles.zhongkefu.com.cn/cmsmima/frontend_upload/5c78be111ebda.jpg">
	<!-- jpg格式是有损压缩，不支持透明背景，不支持动态度
	png是无损压缩，支持透明背景，不支持动态图
	bmp是不压缩，支持透明背景和动态图 
	gif支持简单（物体的性状边缘规则清晰）透明背景，支持动态图
	webp具备上述优点，但是需要解决兼容性问题
	base64是图转文编码的一项技术，本质上都是二进制
	打开小图片可以用，或者需要和网页一起加载的时候用
	-->








	<!--以下是超链接-->
	<a href="https://www.xiaohongshu.com/explore?language=zh-CN"
		target="_self"> <!--这是超链接跳转，这样就在新的标签页打开了
							就是在当前页签打开-->
		<img width="100" src="https://cmsfiles.zhongkefu.com.cn/cmsmima/frontend_upload/5c78be111ebda.jpg">
	</a>
	<!-- 注意，你在代码里敲的回车会被解析成空格，且多个只解析为一个  -->
	<a href="https://www.bilibili.com/video/BV1p84y1P7Z5?spm_id_from=333.788.videopod.episodes&vd_source=bed4840da4fdfd42e7b8c03cf12acf53&p=30"
		target="_blank">
		赶紧去学习
	</a>
	<a href="./03_html基本结构.html" target="_blank">
		可以跳转本地连接
	</a><!-- 当然，a标签不能再嵌套a标签-->
	<a href="./kk的头像.jpg" target="_blank">
		点击看kk帅气自拍
	</a>
	<!--对于浏览器不能直接打开的文件，比如压缩包浏览器会强制下载，当然使用download属性也可以强制下载-->
	<a href="./视频/广州的春天.mp4" download>
		Click here to download the picture of kk.
	</a>

</body>
</html>
