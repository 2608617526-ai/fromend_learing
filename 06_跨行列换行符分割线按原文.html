<!DOCTYPE html>
<!--你妈的不要再在早上睡觉了！-->
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>表格的跨行和跨列</title>
    </head>
    <body>
        <a href="https://pedict.gtimg.com/share/upload/FBC874044C5B471AB87CBAA2D80DC3841773154097.png"
         target="_blank">点击查看kk打字总字数</a>
        <table border="1">
            <!--先，再一行一行调-->
            <caption>课程表</caption>
            <thead>
                <tr>
                        <th>项目</th>
                        <th colspan="5">课程</th>
                        <!-- <th>1-3</th>
                        <th>1-4</th>
                        <th>1-5</th>
                        <th>1-6</th> -->
                        <th colspan="2">活动与休息</th>
                        <!-- <th>1-8</th> -->
                </tr>
                <!--按住shift和alt健，再按住鼠标，可以做到同时修改-->
            </thead>
            <tbody>
                <tr>
                        <th>星期</th>
                        <th>星期一</th>
                        <th>星期二</th>
                        <th>星期三</th>
                        <th>星期四</th>
                        <th>星期五</th>
                        <th>星期六</th>
                        <th>星期天</th>
                </tr>
                <tr>
                        <th rowspan="4">3-1</th>
                        <th>3-2</th>
                        <th>3-3</th>
                        <th>3-4</th>
                        <th>3-5</th>
                        <th>3-6</th>
                        <th>3-7</th>
                        <th rowspan="4">3-8</th>
                </tr>
                <tr>
                        <th>4-3</th>
                        <th>4-4</th>
                        <th>4-5</th>
                        <th>4-6</th>
                        <th>4-7</th>
                        <th>4-8</th>
                </tr>
                <tr>
                        <th>5-3</th>
                        <th>5-4</th>
                        <th>5-5</th>
                        <th>5-6</th>
                        <th>5-7</th>
                        <th>5-8</th>
                </tr>
                <tr>
                        <th>6-3</th>
                        <th>6-4</th>
                        <th>6-5</th>
                        <th>6-6</th>
                        <th>6-7</th>
                        <th>6-8</th>
                </tr>
                <tr>
                        <th rowspan="2">7-1</th>
                        <th>7-2</th>
                        <th>7-3</th>
                        <th>7-4</th>
                        <th>7-5</th>
                        <th>7-6</th>
                        <th>7-7</th>
                        <th rowspan="2">7-8</th>
                </tr>
                <tr>
                        <th>8-3</th>
                        <th>8-4</th>
                        <th>8-5</th>
                        <th>8-6</th>
                        <th>8-7</th>
                        <th>8-8</th>
                </tr>
            </tbody>
        </table>

        <!--br是换行符-->
        <a>去上课</a><br>
        <a>去吃饭</a>

        <!--hr是分割线，而且是有语义的，语义就是分隔。如果你只是想画一条线装饰，那就不要用-->
        <div>这是一个王子和和公主的故事</div>
        <hr>
        <p>kk和她在一起了</p>

        <!--按原文显示，按照代码的原文显示-->
        <pre>
            I       love      you
        </pre>
        <p> I      love   
             you</p>
    </body>
</html>
