<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>
        超链接锚点
    </title>
<body>

<a href="#yzm">看快乐星猫</a>
<a href="#yyy">看快乐猫</a>
<!-- 别忘了加#号 -->

<p>我是一只猫，快乐的星猫</p>
<img src="./kk的头像.jpg" alt="kk的头像">

<p>我是一只猫，快乐的星猫</p>
<img src="./kk的头像.jpg" alt="kk的头像">

<p>我是一只猫，快乐的星猫</p>
<img src="./kk的头像.jpg" alt="kk的头像">

<a name="yzm"></a>
<!-- 这就是锚点，只有a标签才有锚点 -->

<p id="yyy">我是一只猫，快乐的星猫</p>
<!-- 或者给p标签加id属性也可以跳转 -->
<img src="./kk的头像.jpg" alt="kk的头像">


</body>
</head>
</html>
