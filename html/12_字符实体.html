<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>字符实体</title>
</head>
<body>
    <div>我 美女</div>
    <pre>我  i
              大帅哥    </pre>
    <div>我&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;帅哥</div>
    <!--&加上实体名称可以实现,空格是字符实体中的一种-->
    <div>我&#160;</div>
    <div>我们学习过很多的标题标签，其中&lt;h1&gt;是最级别最高的</div>
    <!--可以用来表示尖括号-->
    <div>表示空格的字符实体是&amp;nbsp</div>
    <div>&amp;amp</div>
    <div>当前商品的价格是￥199</div>
    <div>当前商品的价格是&yen;199</div>
    <div>版权所有©️</div>
    <div>版权所有&copy;</div>
    <div>2×2</div>
    <div>2&times;2</div>
    <!--其实就是方便地在网页表示多种符号-->
</body>
</html>
