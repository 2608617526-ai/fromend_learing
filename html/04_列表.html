<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>列表</title>
    </head>
    <body>
        <h2>把大象放冰箱门总共分为几步</h2>
        <ol><!--有序列表，li是列表的项-->
            <li>把冰箱门打开</li>
            <li>把大象放回去</li>
            <li>把冰箱门关上</li>
            <li><a href="https://www.baidu.com" target="_blank">去百度</a></li>
        </ol>

        <h2>我想去的几个城市</h2>
        <ul><!--无序列表,列表都是可以嵌套的-->
            <li>
                <span>成都</span><!--span标签用来分组-->
                <ul>
                    <li>四川农业大学</li>
                    <li>武侯祠</li>
                    <li>IFS</li>
                </ul>
            </li>
            <li>北京</li>
            <li>上海</li>
        </ul>
            <!--自定义列表-->   
        <h2>如何学好英语呢？</h2>
        <dl>
            <dt>dt是自定义列表中的项</dt>
            <dd>dd标签能够用来对列表中的项进行描述</dd>
            <dd>这样的描述可以有很多行</dd>
        </dl>
    </body>
</html>
