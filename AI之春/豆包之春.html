<!DOCTYPE html>
<html lang="zh - CN">

<head>
    <meta charset="UTF - 8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探寻广州之春</title>
    <style>
        body {
            font-family: Arial, sans - serif;
            margin: 0;
            padding: 0;
            background: linear - gradient(to bottom, #f0f9ff, #e0e8ff);
        }

        header {
            background - color: #007bff;
            color: white;
            text - align: center;
            padding: 20px;
            box - shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav {
            background - color: #0056b3;
            overflow: hidden;
        }

        nav a {
            float: left;
            display: block;
            color: white;
            text - align: center;
            padding: 14px 16px;
            text - decoration: none;
        }

        nav a:hover {
            background - color: #003f80;
        }

        .content {
            padding: 20px;
        }

        .image - gallery {
            display: flex;
            flex - wrap: wrap;
            justify - content: space - around;
        }

        .image - gallery img {
            width: 300px;
            height: 200px;
            object - fit: cover;
            margin: 10px;
            box - shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease - in - out;
        }

        .image - gallery img:hover {
            transform: scale(1.1);
        }

        .video - section {
            text - align: center;
            margin - top: 30px;
        }

        video {
            width: 80%;
            max - width: 640px;
            box - shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .description {
            margin - top: 20px;
            line - height: 1.6;
        }

        footer {
            background - color: #007bff;
            color: white;
            text - align: center;
            padding: 10px;
            margin - top: 30px;
        }

        /* 使用媒体查询实现响应式布局 */
        @media (max - width: 600px) {
            .image - gallery img {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>探寻广州之春</h1>
    </header>
    <nav>
        <a href="#">首页</a>
        <a href="#">赏花景点</a>
        <a href="#">春日美食</a>
        <a href="#">活动推荐</a>
    </nav>
    <div class="content">
        <h2>广州春天的魅力</h2>
        <p class="description">广州的春天，宛如一幅绚丽多彩的画卷，徐徐展开。温暖的阳光洒在大地上，唤醒了沉睡的花朵，处处洋溢着生机与活力。</p>
        <div class="image - gallery">
            <img src="https://via.placeholder.com/300x200?text=广州春天的花1" alt="广州春天的花1">
            <img src="https://via.placeholder.com/300x200?text=广州春天的花2" alt="广州春天的花2">
            <img src="https://via.placeholder.com/300x200?text=广州春天的花3" alt="广州春天的花3">
            <img src="https://via.placeholder.com/300x200?text=广州春天的花4" alt="广州春天的花4">
        </div>
        <div class="video - section">
            <h2>广州春日景象视频</h2>
            <video controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                您的浏览器不支持视频标签。
            </video>
        </div>
        <h2>春日赏花景点介绍</h2>
        <p class="description">广州有许多著名的赏花景点，如白云山，每到春天，漫山遍野的花朵竞相开放，红的像火，粉的像霞，白的像雪……</p>
        <h2>春日美食推荐</h2>
        <p class="description">在广州的春天，一定要品尝当地的特色春日美食，如鲜嫩的春笋菜肴，口感清爽，充满春天的气息……</p>
        <h2>春日活动推荐</h2>
        <p class="description">春天的广州，各类活动精彩纷呈。从热闹的花市到充满文化气息的艺术展览，让您尽情享受春天的欢乐。</p>
    </div>
    <footer>
        &copy; 2024 探寻广州之春网站版权所有
    </footer>
</body>

</html>
