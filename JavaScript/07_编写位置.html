<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>js编写位置</title>
	<style>

	</style>
</head>
<body>
	<button onclick="alert('真无语，让你点你还真点嘛？')">点我一下</button>
    <!-- onclick点击时才会执行 -->
    <br>
    <a href="javascript:alert('点了没事的');">让你点就点呗</a>
    <a href="javascript:;">让你点就点呗</a>
    <!-- 这样编写不适合维护，用得不多，适合紧急场景使用 -->
     <p>可以卸载外部文件在不同页面中同时引用，这是推荐的方式</p>
</body>
</html>
