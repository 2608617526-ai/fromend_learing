<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>通配选择器</title>
   <style>
        .chinese {
            color:aqua;
        }
        .english{
            font-size: large;
        }
   </style>
</head>
<body>
	<h1>欢迎来到土味官网</h1>
    <h2>土味情话</h2>
    <h2>hhhhh</h2>
    <h3>学了谈不了一点恋爱</h3>
    <p class="chinese"> 想学吗？想学吗？</p>
    <p class="chinese"> 想学吗？想要学会吗？</p>
    <span class="chinese english">我就是想学</span>
    <!-- 一个标签只能写一个glass，你如果要让一个标签同时又两个名字
    类选择器的类，不能是纯数字 -->
    <p class="english">I do not want to teach you</p>
</body>
</html>
