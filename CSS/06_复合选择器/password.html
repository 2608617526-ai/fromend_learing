<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA 密码机 - 教学演示</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
            background: #f5f7fb;
            color: #1e293b;
        }
        h1 {
            text-align: center;
            color: #0f172a;
        }
        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 2rem;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 0.5rem;
        }
        .warning {
            background: #fef9c3;
            border-left: 6px solid #eab308;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 2rem;
            transition: 0.2s;
        }
        .key-area {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .key-box {
            flex: 1;
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }
        .key-box h3 {
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 16px;
            overflow-x: auto;
            font-size: 0.75rem;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        button.secondary {
            background: #64748b;
        }
        button.outline {
            background: white;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        button.danger {
            background: #ef4444;
        }
        button:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }
        textarea, input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
        }
        hr {
            margin: 1rem 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .show-private {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 0.5rem;
            margin-top: 0.5rem;
        }
        footer {
            text-align: center;
            color: #64748b;
            margin-top: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<h1>🔐 RSA 密码机</h1>
<div class="sub">公钥加密 · 私钥解密 · 浏览器本地运行</div>

<div class="warning">
    ⚠️ 教学演示专用：本工具使用 Web Crypto API (RSA-OAEP, 2048位)。<br>
    请勿用于保护真实敏感数据，私钥仅保存在当前页面内存中，刷新即丢失。
</div>

<div class="card">
    <div class="flex-between">
        <h2>📌 密钥管理</h2>
        <div>
            <button id="genKeyBtn">✨ 生成新密钥对 (2048位 RSA)</button>
        </div>
    </div>
    <div class="key-area">
        <div class="key-box">
            <h3>🔓 公钥 <span style="font-size:0.7rem;">(用于加密)</span>
                <button id="copyPubBtn" class="outline" style="font-size:0.7rem;">复制</button>
            </h3>
            <pre id="publicKeyPem">未生成密钥</pre>
        </div>
        <div class="key-box">
            <h3>🔒 私钥 <span style="font-size:0.7rem;">(用于解密，请勿泄露)</span>
                <button id="copyPrivBtn" class="outline" style="font-size:0.7rem;">复制</button>
                <button id="togglePrivBtn" class="secondary" style="font-size:0.7rem;">👁️ 显示</button>
            </h3>
            <pre id="privateKeyPem" style="display:none;">未生成密钥</pre>
            <div id="privateMask" style="background:#e2e8f0; padding:0.5rem; border-radius:16px; text-align:center; color:#475569;">
                私钥已隐藏，点击「显示」查看
            </div>
        </div>
    </div>
    <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button id="exportPubBtn" class="secondary">📎 导出公钥 (PEM文件)</button>
        <button id="exportPrivBtn" class="secondary">📎 导出私钥 (PEM文件·危险)</button>
        <label class="secondary" style="background:#64748b; padding:0.5rem 1rem; border-radius:40px; color:white; cursor:pointer;">
            📂 导入密钥对 (JSON)
            <input type="file" id="importKeyFile" accept=".json" style="display:none;">
        </label>
    </div>
</div>

<div class="card">
    <div class="row">
        <div class="col">
            <h3>✍️ 明文</h3>
            <textarea id="plaintext" rows="4" placeholder="输入要加密的文本..."></textarea>
            <button id="encryptBtn">🔒 加密 (使用公钥)</button>
            <button id="clearPlainBtn" class="outline">清空</button>
        </div>
        <div class="col">
            <h3>🔐 密文 (Base64)</h3>
            <textarea id="ciphertext" rows="4" placeholder="加密后的Base64密文..."></textarea>
            <button id="decryptBtn">🔓 解密 (使用私钥)</button>
            <button id="copyCipherBtn" class="outline">复制密文</button>
        </div>
    </div>
    <div class="row" style="margin-top:1rem;">
        <div class="col">
            <h3>📄 解密结果</h3>
            <textarea id="decryptedResult" rows="2" readonly placeholder="解密后的明文会显示在这里..."></textarea>
        </div>
    </div>
</div>

<footer>
    🔧 基于 Web Crypto API (RSA-OAEP, SHA-256) | 密钥不会离开你的浏览器
</footer>

<script>
    // ---------- 全局变量 ----------
    let currentPublicKey = null;   // CryptoKey 对象 (公钥)
    let currentPrivateKey = null;  // CryptoKey 对象 (私钥)

    // ---------- 辅助函数：ArrayBuffer <-> Base64 ----------
    function abToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToAb(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // 将导出的SPKI/PKCS8 (ArrayBuffer) 转成 PEM 格式字符串
    function arrayBufferToPem(buffer, type) {
        const base64 = abToBase64(buffer);
        let pem = `-----BEGIN ${type}-----\n`;
        for (let i = 0; i < base64.length; i += 64) {
            pem += base64.substr(i, 64) + '\n';
        }
        pem += `-----END ${type}-----\n`;
        return pem;
    }

    // 更新界面上的公钥显示 (PEM)
    async function updatePublicKeyDisplay() {
        if (!currentPublicKey) {
            document.getElementById('publicKeyPem').innerText = '未生成密钥';
            return;
        }
        const spki = await window.crypto.subtle.exportKey('spki', currentPublicKey);
        const pem = arrayBufferToPem(spki, 'PUBLIC KEY');
        document.getElementById('publicKeyPem').innerText = pem;
    }

    // 更新私钥显示 (默认隐藏，只在点击显示时展示)
    let privateVisible = false;
    async function updatePrivateKeyDisplay() {
        if (!currentPrivateKey) {
            document.getElementById('privateKeyPem').innerText = '未生成密钥';
            document.getElementById('privateMask').style.display = 'block';
            document.getElementById('privateKeyPem').style.display = 'none';
            return;
        }
        const pkcs8 = await window.crypto.subtle.exportKey('pkcs8', currentPrivateKey);
        const pem = arrayBufferToPem(pkcs8, 'PRIVATE KEY');
        document.getElementById('privateKeyPem').innerText = pem;
        if (privateVisible) {
            document.getElementById('privateKeyPem').style.display = 'block';
            document.getElementById('privateMask').style.display = 'none';
        } else {
            document.getElementById('privateKeyPem').style.display = 'none';
            document.getElementById('privateMask').style.display = 'block';
        }
    }

    // 生成 RSA 密钥对 (2048位，RSA-OAEP，SHA-256)
    async function generateRSAKeyPair() {
        try {
            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: 'RSA-OAEP',
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]), // 65537
                    hash: 'SHA-256',
                },
                true,   // 可导出
                ['encrypt', 'decrypt']   // 公钥加密，私钥解密
            );
            currentPublicKey = keyPair.publicKey;
            currentPrivateKey = keyPair.privateKey;
            await updatePublicKeyDisplay();
            await updatePrivateKeyDisplay();
            alert('✅ 新密钥对生成成功 (2048位 RSA)');
        } catch (err) {
            console.error(err);
            alert('生成密钥失败：' + err.message);
        }
    }

    // 加密：用公钥加密明文 -> Base64 密文
    async function encryptWithPublicKey(plainText) {
        if (!currentPublicKey) {
            throw new Error('请先生成或导入公钥');
        }
        const encoder = new TextEncoder();
        const data = encoder.encode(plainText);
        const encryptedBuffer = await window.crypto.subtle.encrypt(
            {
                name: 'RSA-OAEP',
            },
            currentPublicKey,
            data
        );
        return abToBase64(encryptedBuffer);
    }

    // 解密：用私钥解密密文(Base64) -> 明文
    async function decryptWithPrivateKey(cipherBase64) {
        if (!currentPrivateKey) {
            throw new Error('请先生成或导入私钥');
        }
        const encryptedData = base64ToAb(cipherBase64);
        const decryptedBuffer = await window.crypto.subtle.decrypt(
            {
                name: 'RSA-OAEP',
            },
            currentPrivateKey,
            encryptedData
        );
        const decoder = new TextDecoder();
        return decoder.decode(decryptedBuffer);
    }

    // 导出公钥为 PEM 文件
    async function exportPublicKeyToFile() {
        if (!currentPublicKey) return alert('无公钥');
        const spki = await window.crypto.subtle.exportKey('spki', currentPublicKey);
        const pem = arrayBufferToPem(spki, 'PUBLIC KEY');
        const blob = new Blob([pem], { type: 'application/x-pem-file' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'public_key.pem';
        a.click();
        URL.revokeObjectURL(url);
    }

    // 导出私钥为 PEM 文件（危险）
    async function exportPrivateKeyToFile() {
        if (!currentPrivateKey) return alert('无私钥');
        const confirm = window.confirm('⚠️ 导出私钥非常危险！任何人获得私钥都可以解密你的数据。确定导出？');
        if (!confirm) return;
        const pkcs8 = await window.crypto.subtle.exportKey('pkcs8', currentPrivateKey);
        const pem = arrayBufferToPem(pkcs8, 'PRIVATE KEY');
        const blob = new Blob([pem], { type: 'application/x-pem-file' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'private_key.pem';
        a.click();
        URL.revokeObjectURL(url);
    }

    // 导入密钥对（JSON格式：{publicKeySpkiBase64, privateKeyPkcs8Base64}）
    async function importKeyPairFromJson(jsonObj) {
        try {
            const pubSpki = base64ToAb(jsonObj.publicKeySpkiBase64);
            const privPkcs8 = base64ToAb(jsonObj.privateKeyPkcs8Base64);
            const publicKey = await window.crypto.subtle.importKey(
                'spki', pubSpki,
                { name: 'RSA-OAEP', hash: 'SHA-256' },
                true,
                ['encrypt']
            );
            const privateKey = await window.crypto.subtle.importKey(
                'pkcs8', privPkcs8,
                { name: 'RSA-OAEP', hash: 'SHA-256' },
                true,
                ['decrypt']
            );
            currentPublicKey = publicKey;
            currentPrivateKey = privateKey;
            await updatePublicKeyDisplay();
            await updatePrivateKeyDisplay();
            alert('✅ 密钥对导入成功');
        } catch (err) {
            console.error(err);
            alert('导入失败：文件格式不正确或密钥不匹配');
        }
    }

    // 监听文件导入
    document.getElementById('importKeyFile').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const json = JSON.parse(ev.target.result);
                if (!json.publicKeySpkiBase64 || !json.privateKeyPkcs8Base64) throw new Error('缺少字段');
                await importKeyPairFromJson(json);
            } catch (err) {
                alert('解析失败：需要JSON文件，包含 publicKeySpkiBase64 和 privateKeyPkcs8Base64');
            } finally {
                e.target.value = '';
            }
        };
        reader.readAsText(file);
    });

    // 复制文本到剪贴板
    function copyToClipboard(text, successMsg) {
        navigator.clipboard.writeText(text).then(() => {
            alert(successMsg || '已复制');
        }).catch(() => alert('复制失败，手动复制吧'));
    }

    // ---------- 事件绑定 ----------
    document.getElementById('genKeyBtn').addEventListener('click', generateRSAKeyPair);
    document.getElementById('encryptBtn').addEventListener('click', async () => {
        const plain = document.getElementById('plaintext').value;
        if (!plain.trim()) return alert('请输入明文');
        try {
            const cipherBase64 = await encryptWithPublicKey(plain);
            document.getElementById('ciphertext').value = cipherBase64;
            document.getElementById('decryptedResult').value = '';
        } catch (err) {
            alert('加密失败：' + err.message);
        }
    });
    document.getElementById('decryptBtn').addEventListener('click', async () => {
        const cipher = document.getElementById('ciphertext').value;
        if (!cipher.trim()) return alert('请输入Base64密文');
        try {
            const plain = await decryptWithPrivateKey(cipher);
            document.getElementById('decryptedResult').value = plain;
        } catch (err) {
            alert('解密失败：密钥不匹配或密文损坏\n' + err.message);
        }
    });
    document.getElementById('copyPubBtn').addEventListener('click', () => {
        const pem = document.getElementById('publicKeyPem').innerText;
        if (pem && pem !== '未生成密钥') copyToClipboard(pem, '公钥已复制');
        else alert('无公钥');
    });
    document.getElementById('copyPrivBtn').addEventListener('click', async () => {
        if (!currentPrivateKey) return alert('无私钥');
        const pkcs8 = await window.crypto.subtle.exportKey('pkcs8', currentPrivateKey);
        const pem = arrayBufferToPem(pkcs8, 'PRIVATE KEY');
        copyToClipboard(pem, '私钥已复制 (请妥善保管)');
    });
    document.getElementById('togglePrivBtn').addEventListener('click', () => {
        if (!currentPrivateKey) return alert('请先生成密钥');
        privateVisible = !privateVisible;
        updatePrivateKeyDisplay();
        document.getElementById('togglePrivBtn').innerText = privateVisible ? '🙈 隐藏' : '👁️ 显示';
    });
    document.getElementById('exportPubBtn').addEventListener('click', exportPublicKeyToFile);
    document.getElementById('exportPrivBtn').addEventListener('click', exportPrivateKeyToFile);
    document.getElementById('clearPlainBtn').addEventListener('click', () => {
        document.getElementById('plaintext').value = '';
    });
    document.getElementById('copyCipherBtn').addEventListener('click', () => {
        const cipher = document.getElementById('ciphertext').value;
        if (cipher) copyToClipboard(cipher, '密文已复制');
        else alert('无密文');
    });

    // 可选：生成一个默认演示密钥（让用户一开始就能玩）
    window.addEventListener('load', () => {
        generateRSAKeyPair().catch(console.warn);
    });
</script>
</body>
</html>
