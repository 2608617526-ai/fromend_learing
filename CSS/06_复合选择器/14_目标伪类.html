<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title></title>
	<style>
		div{
			background-color: gray;
		}
		div:target{
			background-color: green;
		}
		/* 目标伪类，选中锚点所指向的元素，不常用 */
	</style>
</head>
<body>
	<a href="#one">第一个</a>
	<a href="#two">第二</a>
	<a href="#three">第三</a>
	<a href="#four">第四</a>
	<a href="#five">第五</a>
	<a href="#six">第六</a>

	<div id="one">1</div>
	<br>
	<div id="two">2</div>
	<br>
	<div id="three">3</div>
	<br>
	<div id="four">4</div>
	<br>
	<div id="five">5</div>
	<br>
	<div id="six">6</div>

</body>
</html>
