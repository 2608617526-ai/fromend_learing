<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>否定伪类</title>
	<style>
		div>p:not(.fail){
            /* 除了fail这类之外的div的p元素 */
            color:red;
        }
        div>span:not([title^="加油！"]){
            color:blue;
        }
        div>p:not(:nth-last-of-type(-n+2)){
            color:green;
        }
	</style>
</head>
<body>
    <div>
	<p>1</p>
    <p>2</p>
    <p>3</p>
    <span title="真棒！">4</span>
    <p class="fail" title="加油！">5</p>
    <p class="fail" title="加油！">6</p>
    </div>
</body>
</html>
