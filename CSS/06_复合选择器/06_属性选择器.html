<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>属性选择器</title>
    <style>
        /* 第一种写法，选中具有title属性的元素 */
        [title]{
            color:red;
        }
        [title="2"]{
            color:blue;
        }
        [title^="a"]{
            /* 选中具有title属性切属性值以a开头的 */
            color:green;
        }
         [title$="3"]{
            /* 选中具有title属性切属性值以a开头的 */
            color:yellow;
        }
        [title*="d"]{
            /* title属性值里只要有d就可以 */
            color:brown;
        }

    </style>
</head>
<body>
	<div title="1">1</div>
    <div title="2">2</div>
    <div title="a1">3</div>
    <div title="a2">4</div>
    <div title="dd51">5</div>
    <div title="a3">6</div>
</body>
</html>
