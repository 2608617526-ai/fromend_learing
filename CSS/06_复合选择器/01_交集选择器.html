<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>交集选择器</title>
	<style>
		.rich{
			color:blue;
			font-size:larger;
		}
		p.beauty#wc{
			color: antiquewhite;
		}
		.rich.handsome{
			color: black;
			font-size:xx-small;
		}
		/* 后来的会覆盖前面的，你可以利用这个特性，hhh */
		/* id一般不写前面的属性了hhh，已经可以唯一确定，多余 */
	</style>
</head>
<body>
	<h2 class="rich">张罡锟</h2>
	<h2 class="beauty">yyx</h2>
	<h2 class="rich handsome">小明星</h2>
	<hr>
	<p class="rich">小猪佩奇</p>
	<p class="rich" id="wc">小狗旺财</p>
	<p class="beauty">小猫咪咪</p>
</body>
</html>
