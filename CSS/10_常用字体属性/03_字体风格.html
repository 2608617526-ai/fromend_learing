<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>字体风格</title>
	<style>
		.a1{
            font-style: normal;
        }
        .a2{
            font-style: italic;
            /* 这就是寻找文本自带斜体，如果字体没有带斜体，那就回强制倾斜，一般开发都用这个 */

        }
        .a3{
            font-style: oblique;
            /* 这个是强制倾斜 */
        }
	</style>
</head>
<body>
	<div class="a1">看看真帅</div>
    <div class="a2">我真牛逼</div>
    <div class="a3">我真牛逼哇塞</div>
    <em>尚硅谷4</em>
</body>
</html>
