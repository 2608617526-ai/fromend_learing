<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>字体大小</title>
	<style>
        .guigu{
			font-size: 12px;
		}
		body{
			font-size: 100px;
		}
	</style>
</head>
<body>
	<div class="guigu">尚硅谷</div>
	<div>尚硅谷2</div>
	<div>默认字体大小好像16px的</div>
	<!-- 不能用默认样式，必须要规范字体大小 -->
	<!-- 按F12,就可以在style里面可以临时修改样式 -->
</body>
</html>
