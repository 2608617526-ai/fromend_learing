<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>像素</title>
	<style>
        .atguigu1{
            width:100px;
            height:100px;
            background-color: rgb(138,43,226);
        }
        .颜色{
            width:100px;
            height:100px;
            background-color: rgb(50%,43%,7%);
        }
        .颜色1{
            width:100px;
            height:100px;
            background-color: rgba(255,0,0,0.1);
            /* rgba的这个a是控制透明度 */
        }
	</style>
</head>
<body>
	<div class="atguigu1">a</div>
    <div class="颜色">b</div>
    <div class="颜色1">b</div>
</body>
</html>
